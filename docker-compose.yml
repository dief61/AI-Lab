services:
  db:
    container_name: R-DB
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./Datenbank/create_tables.sql:/docker-entrypoint-initdb.d/01_create_tables.sql

volumes:
  pgdata:
