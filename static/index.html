<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CRM Verwaltung</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f4f6f9; color: #1a1a2e; padding: 2rem; }
  h1 { margin-bottom: 1.5rem; font-size: 1.8rem; }
  .tabs { display: flex; gap: 0; margin-bottom: 1.5rem; }
  .tabs button {
    padding: 0.7rem 1.8rem; border: 1px solid #ccc; background: #fff; cursor: pointer;
    font-size: 1rem; font-weight: 600; border-radius: 6px 6px 0 0; margin-right: 4px;
  }
  .tabs button.active { background: #4361ee; color: #fff; border-color: #4361ee; }
  .toolbar { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .toolbar label { display: flex; align-items: center; gap: 0.4rem; font-size: 0.9rem; cursor: pointer; }
  .toolbar input[type=checkbox] { width: 1rem; height: 1rem; cursor: pointer; }
  .table-wrap { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.08); overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid #e9ecef; white-space: nowrap; }
  th { background: #f8f9fa; font-weight: 600; }
  tr.deleted { background: #fff0f0; }
  tr.deleted:hover { background: #ffe0e0; }
  tr:hover { background: #f1f3f5; }
  .actions { display: flex; gap: 0.5rem; }
  button {
    padding: 0.4rem 0.9rem; border: none; border-radius: 4px; cursor: pointer;
    font-size: 0.85rem; font-weight: 500;
  }
  .btn-add { background: #4361ee; color: #fff; padding: 0.6rem 1.2rem; font-size: 0.95rem; }
  .btn-edit { background: #ffd166; color: #1a1a2e; }
  .btn-delete { background: #ef476f; color: #fff; }
  .btn-restore { background: #06d6a0; color: #fff; }
  .btn-save { background: #06d6a0; color: #fff; }
  .btn-cancel { background: #adb5bd; color: #fff; }
  .btn-restore-batch { background: #06d6a0; color: #fff; padding: 0.6rem 1.2rem; font-size: 0.95rem; }
  .modal {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
    justify-content: center; align-items: center; z-index: 1000;
  }
  .modal.open { display: flex; }
  .modal-content {
    background: #fff; padding: 2rem; border-radius: 10px; width: 100%; max-width: 520px;
    box-shadow: 0 10px 40px rgba(0,0,0,.2); max-height: 90vh; overflow-y: auto;
  }
  .modal-content h2 { margin-bottom: 1.2rem; }
  .form-group { margin-bottom: 0.9rem; }
  .form-group label { display: block; font-weight: 500; margin-bottom: 0.25rem; font-size: 0.9rem; }
  .form-group input { width: 100%; padding: 0.55rem 0.75rem; border: 1px solid #ced4da; border-radius: 4px; font-size: 0.95rem; }
  .form-actions { display: flex; gap: 0.75rem; margin-top: 1.2rem; justify-content: flex-end; }
  .empty { text-align: center; padding: 2rem; color: #6c757d; font-style: italic; }
  .toast {
    position: fixed; bottom: 2rem; right: 2rem; background: #1a1a2e; color: #fff;
    padding: 0.75rem 1.5rem; border-radius: 6px; opacity: 0; transition: opacity .3s;
    z-index: 2000; font-size: 0.9rem;
  }
  .toast.show { opacity: 1; }
  .check-col { width: 40px; text-align: center; }
</style>
</head>
<body>

<h1>CRM Verwaltung</h1>

<div class="tabs">
  <button id="tabSeller" class="active" onclick="switchTab('seller')">Verkäufer (Seller)</button>
  <button id="tabBuyer" onclick="switchTab('buyer')">Käufer (Buyer)</button>
</div>

<div class="toolbar">
  <button class="btn-add" onclick="openCreate()">+ Neu anlegen</button>
  <label id="deletedToggle" style="display:none">
    <input type="checkbox" onchange="toggleDeleted()">
    Gelöschte anzeigen
  </label>
  <button class="btn-restore-batch" id="restoreBatchBtn" style="display:none" onclick="restoreSelected()">Wiederherstellen</button>
</div>

<div class="table-wrap">
  <table>
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div class="modal" id="formModal">
  <div class="modal-content">
    <h2 id="modalTitle">Eintrag</h2>
    <form id="entryForm" onsubmit="saveEntry(event)"></form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = {
  seller: { list: '/api/sellers', single: id => `/api/sellers/${id}` },
  buyer:  { list: '/api/buyers',  single: id => `/api/buyers/${id}`,
            restore: id => `/api/buyers/${id}/restore`,
            restoreBatch: '/api/buyers/restore' },
};

let currentTab = 'seller';
let editId = null;
let showDeleted = false;
let allBuyers = [];

const SELLER_FIELDS = [
  { key: 'name', label: 'Name' },
  { key: 'strasse', label: 'Straße' },
  { key: 'plz', label: 'PLZ' },
  { key: 'ort', label: 'Ort' },
  { key: 'steuernummer', label: 'Steuernummer' },
  { key: 'email', label: 'E-Mail' },
];

const BUYER_FIELDS = [
  { key: 'name', label: 'Name' },
  { key: 'strasse', label: 'Straße' },
  { key: 'plz', label: 'PLZ' },
  { key: 'ort', label: 'Ort' },
  { key: 'email', label: 'E-Mail' },
];

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabSeller').className = tab === 'seller' ? 'active' : '';
  document.getElementById('tabBuyer').className  = tab === 'buyer' ? 'active' : '';
  editId = null;
  const toggle = document.getElementById('deletedToggle');
  toggle.style.display = tab === 'buyer' ? '' : 'none';
  if (tab !== 'buyer') showDeleted = false;
  document.getElementById('restoreBatchBtn').style.display = 'none';
  loadTable();
}

async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json', ...opts.headers },
    ...opts,
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error(text || res.statusText);
  }
  if (res.status === 204) return null;
  return res.json();
}

function fieldsFor(tab) {
  return tab === 'seller' ? SELLER_FIELDS : BUYER_FIELDS;
}

function toggleDeleted() {
  showDeleted = document.querySelector('#deletedToggle input').checked;
  document.getElementById('restoreBatchBtn').style.display = showDeleted ? '' : 'none';
  loadTable();
}

async function loadTable() {
  if (currentTab === 'buyer') {
    const url = showDeleted ? '/api/buyers?geloescht=1' : '/api/buyers';
    allBuyers = await api(url);
  }
  const data = currentTab === 'buyer' ? allBuyers : await api(API[currentTab].list);
  const fields = fieldsFor(currentTab);
  const head = document.getElementById('tableHead');
  const body = document.getElementById('tableBody');

  let extraHeaders = '<th>Aktionen</th>';
  let showCheck = currentTab === 'buyer' && showDeleted;
  if (showCheck) extraHeaders = '<th class="check-col"><input type="checkbox" onchange="toggleAll(event)"></th>' + extraHeaders;

  head.innerHTML = '<tr>' + fields.map(f => `<th>${f.label}</th>`).join('') + extraHeaders + '</tr>';

  if (!data || data.length === 0) {
    body.innerHTML = '<tr><td colspan="' + (fields.length + (showCheck ? 2 : 1)) + '" class="empty">Keine Einträge vorhanden</td></tr>';
    return;
  }

  body.innerHTML = data.map(item => {
    const cells = fields.map(f => `<td>${item[f.key] ?? ''}</td>`).join('');
    let checkCell = '';
    if (showCheck) {
      checkCell = `<td class="check-col"><input type="checkbox" class="row-check" value="${item.id}"></td>`;
    }
    let actionBtns;
    if (item.geloescht) {
      actionBtns = `<button class="btn-restore" onclick="restoreSingle(${item.id})">Wiederherstellen</button>`;
    } else {
      actionBtns = `
        <button class="btn-edit" onclick="openEdit(${item.id})">Bearbeiten</button>
        <button class="btn-delete" onclick="deleteEntry(${item.id})">Löschen</button>`;
    }
    const rowClass = item.geloescht ? ' class="deleted"' : '';
    return `<tr${rowClass}>
      ${checkCell}${cells}
      <td class="actions">${actionBtns}</td>
    </tr>`;
  }).join('');
}

function toggleAll(e) {
  document.querySelectorAll('.row-check').forEach(cb => cb.checked = e.target.checked);
}

function getSelectedIds() {
  return Array.from(document.querySelectorAll('.row-check:checked')).map(cb => parseInt(cb.value));
}

async function restoreSelected() {
  const ids = getSelectedIds();
  if (ids.length === 0) { showToast('Keine Einträge ausgewählt'); return; }
  try {
    await api(API.buyer.restoreBatch, { method: 'PUT', body: JSON.stringify({ ids }) });
    showToast(`${ids.length} Eintrag/Einträge wiederhergestellt`);
    loadTable();
  } catch (err) {
    showToast('Fehler: ' + err.message);
  }
}

async function restoreSingle(id) {
  try {
    await api(API.buyer.restore(id), { method: 'PUT' });
    showToast('Eintrag wiederhergestellt');
    loadTable();
  } catch (err) {
    showToast('Fehler: ' + err.message);
  }
}

function openCreate() {
  editId = null;
  const fields = fieldsFor(currentTab);
  document.getElementById('modalTitle').textContent = `Neuen ${currentTab === 'seller' ? 'Verkäufer' : 'Käufer'} anlegen`;
  const form = document.getElementById('entryForm');
  form.innerHTML = fields.map(f => `
    <div class="form-group">
      <label for="f_${f.key}">${f.label}</label>
      <input id="f_${f.key}" name="${f.key}" required>
    </div>
  `).join('') + `
    <div class="form-actions">
      <button type="button" class="btn-cancel" onclick="closeModal()">Abbrechen</button>
      <button type="submit" class="btn-save">Speichern</button>
    </div>`;
  document.getElementById('formModal').classList.add('open');
}

async function openEdit(id) {
  editId = id;
  const item = await api(API[currentTab].single(id));
  const fields = fieldsFor(currentTab);
  document.getElementById('modalTitle').textContent = `${currentTab === 'seller' ? 'Verkäufer' : 'Käufer'} bearbeiten`;
  const form = document.getElementById('entryForm');
  form.innerHTML = fields.map(f => `
    <div class="form-group">
      <label for="f_${f.key}">${f.label}</label>
      <input id="f_${f.key}" name="${f.key}" value="${(item[f.key] ?? '').replace(/"/g, '&quot;')}" required>
    </div>
  `).join('') + `
    <div class="form-actions">
      <button type="button" class="btn-cancel" onclick="closeModal()">Abbrechen</button>
      <button type="submit" class="btn-save">Speichern</button>
    </div>`;
  document.getElementById('formModal').classList.add('open');
}

function closeModal() {
  document.getElementById('formModal').classList.remove('open');
  editId = null;
}

async function saveEntry(e) {
  e.preventDefault();
  const fields = fieldsFor(currentTab);
  const data = {};
  fields.forEach(f => { data[f.key] = document.getElementById(`f_${f.key}`).value; });
  try {
    if (editId) {
      await api(API[currentTab].single(editId), { method: 'PUT', body: JSON.stringify(data) });
      showToast('Eintrag aktualisiert');
    } else {
      await api(API[currentTab].list, { method: 'POST', body: JSON.stringify(data) });
      showToast('Eintrag erstellt');
    }
    closeModal();
    loadTable();
  } catch (err) {
    showToast('Fehler: ' + err.message);
  }
}

async function deleteEntry(id) {
  if (!confirm('Wirklich löschen?')) return;
  try {
    await api(API[currentTab].single(id), { method: 'DELETE' });
    showToast('Eintrag gelöscht');
    loadTable();
  } catch (err) {
    showToast('Fehler: ' + err.message);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

loadTable();
</script>
</body>
</html>
