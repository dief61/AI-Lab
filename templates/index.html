<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hallo Welt API</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>👋 Hallo Welt API</h1>
            <p class="subtitle">Ein einfacher deutscher Begrüßungsdienst</p>
        </header>

        <main>
            <section class="greeting-section">
                <h2>Begrüßung</h2>
                
                <div class="form-group">
                    <label for="mood">Stimmung (optional):</label>
                    <select id="mood" name="mood">
                        <option value="">Keine Stimmung (Standard)</option>
                        <option value="gut">Gut 😊</option>
                        <option value="schlecht">Schlecht 😔</option>
                        <option value="normal">Normal 😐</option>
                        <option value="lustig">Lustig 😂</option>
                    </select>
                </div>

                <button id="greetBtn" class="btn btn-primary">Begrüßen</button>
                
                <div id="result" class="result-box"></div>
            </section>

            <section class="info-section">
                <h2>API Endpunkte</h2>
                <ul>
                    <li><code>/</code> - Begrüßung (HTML)</li>
                    <li><code>/greeting?mood=gut</code> - API mit Stimmung</li>
                    <li><code>/health</code> - Gesundheitscheck</li>
                </ul>
            </section>

            <footer>
                <p>Hallo Welt API v1.0.0</p>
            </footer>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
